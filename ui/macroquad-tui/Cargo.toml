[package]
name = "macroquad-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Text-grid + line-editor + typewriter + key-repeat primitives for macroquad apps. Built for uap-terminal; designed for general reuse."

[lib]
path = "src/lib.rs"

[dependencies]
macroquad = "0.4"

# `sprite_atlas` parses an index JSON describing per-key shard / col /
# row coords. Tiny use of serde; same versions the rest of the
# workspace pulls in.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
