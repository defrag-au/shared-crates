[package]
name = "storybook-egui"
version = "0.1.0"
edition = "2021"
publish = false
# DEV ONLY — egui widgets storybook
# Run with: cd ui/_storybook-egui && trunk serve

[lib]
crate-type = ["cdylib"]

[dependencies]
eframe = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true }
egui-widgets = { path = "../egui-widgets" }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
web-sys = { workspace = true, features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
    "Element",
] }
gloo-timers = { workspace = true, features = ["futures"] }
console_error_panic_hook = "0.1"
log = { workspace = true }
