[package]
name = "egui-widgets"
version.workspace = true
edition.workspace = true

[features]
default = ["cardano"]
image-editor = ["dep:ab_glyph"]
cardano = ["dep:cardano-assets", "dep:wallet-core", "dep:wallet-pallas"]

# egui_inbox is only used by the wasm `file_upload` widget + a re-export, so it
# moved to the wasm-only deps below (native consumers don't pull it).
[dependencies]
authorizations = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true }
ehttp = "0.7"
image = { workspace = true, features = ["jpeg"] }
cardano-assets = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
log = { workspace = true }
i_overlay = "4.4.1"
voronoice = "0.2"
ab_glyph = { version = "0.2", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
egui_inbox = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true, features = [
    "Request", "RequestInit", "Response", "Headers", "Window",
    "Blob", "BlobPropertyBag",
    "HtmlImageElement",
    "ImageBitmap",
    "OffscreenCanvas", "OffscreenCanvasRenderingContext2d",
    "ImageData",
    "WorkerGlobalScope",
    "Document", "Element", "HtmlElement", "HtmlInputElement",
    "FileList", "File", "FileReader",
] }
js-sys = { workspace = true }
wallet-core = { workspace = true, optional = true }
wallet-pallas = { workspace = true, optional = true }
